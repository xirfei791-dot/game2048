<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>2048 - 休闲小游戏</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  user-select: none;
  -webkit-user-select: none;
}

.container {
  background: rgba(255,255,255,0.12);
  backdrop-filter: blur(20px);
  border-radius: 24px;
  padding: 30px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.3);
}

.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  margin-bottom: 20px;
  flex-wrap: wrap;
  gap: 12px;
}

.title {
  font-size: 42px;
  font-weight: 900;
  color: #fff;
  text-shadow: 2px 2px 8px rgba(0,0,0,0.3);
  letter-spacing: 2px;
}

.score-box {
  background: rgba(255,255,255,0.2);
  border-radius: 12px;
  padding: 12px 24px;
  text-align: center;
}

.score-label {
  font-size: 13px;
  color: rgba(255,255,255,0.8);
  text-transform: uppercase;
  letter-spacing: 1px;
}

.score-value {
  font-size: 28px;
  font-weight: 700;
  color: #fff;
}

.controls {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.btn {
  padding: 10px 20px;
  border: none;
  border-radius: 10px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.2s;
  color: #fff;
  letter-spacing: 0.5px;
}

.btn:hover { transform: translateY(-2px); box-shadow: 0 6px 20px rgba(0,0,0,0.3); }
.btn:active { transform: translateY(0); }

.btn-new { background: #ff6b6b; }
.btn-undo { background: #ffa502; }
.btn-best { background: #1e90ff; }

.grid {
  background: rgba(187,173,160,0.35);
  border-radius: 16px;
  padding: 12px;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  grid-template-rows: repeat(4, 1fr);
  gap: 12px;
  width: 420px;
  height: 420px;
}

.cell {
  background: rgba(205,193,180,0.35);
  border-radius: 12px;
  display: flex;
  justify-content: center;
  align-items: center;
  font-size: 36px;
  font-weight: 800;
  color: #776e65;
  transition: all 0.15s ease;
  position: relative;
}

.cell[data-value="2"]    { background: #eee4da; color: #776e65; }
.cell[data-value="4"]    { background: #ede0c8; color: #776e65; }
.cell[data-value="8"]    { background: #f2b179; color: #f9f6f2; }
.cell[data-value="16"]   { background: #f59563; color: #f9f6f2; }
.cell[data-value="32"]   { background: #f67c5f; color: #f9f6f2; }
.cell[data-value="64"]   { background: #f65e3b; color: #f9f6f2; }
.cell[data-value="128"]  { background: #edcf72; color: #f9f6f2; font-size: 32px; }
.cell[data-value="256"]  { background: #edcc61; color: #f9f6f2; font-size: 32px; }
.cell[data-value="512"]  { background: #edc850; color: #f9f6f2; font-size: 32px; }
.cell[data-value="1024"] { background: #edc53f; color: #f9f6f2; font-size: 26px; }
.cell[data-value="2048"] { background: #edc22e; color: #f9f6f2; font-size: 26px; }
.cell[data-value="4096"] { background: #3c3a32; color: #f9f6f2; font-size: 24px; }
.cell[data-value="8192"] { background: #2c8a5e; color: #f9f6f2; font-size: 24px; }

.cell.new-tile { animation: popIn 0.2s ease; }
.cell.merged { animation: popMerge 0.25s ease; }

@keyframes popIn {
  0% { transform: scale(0); opacity: 0; }
  50% { transform: scale(1.15); }
  100% { transform: scale(1); opacity: 1; }
}

@keyframes popMerge {
  0% { transform: scale(1); }
  40% { transform: scale(1.25); }
  100% { transform: scale(1); }
}

.overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(0,0,0,0.5);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 100;
  animation: fadeIn 0.3s ease;
}

@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

.dialog {
  background: #fff;
  border-radius: 20px;
  padding: 36px 40px;
  text-align: center;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  animation: bounceIn 0.4s ease;
}

@keyframes bounceIn {
  0% { transform: scale(0.5); opacity: 0; }
  60% { transform: scale(1.05); }
  100% { transform: scale(1); opacity: 1; }
}

.dialog h2 { font-size: 28px; color: #333; margin-bottom: 12px; }
.dialog p { font-size: 18px; color: #666; margin-bottom: 20px; }
.dialog .btn { font-size: 18px; padding: 14px 32px; }

.tip {
  text-align: center;
  color: rgba(255,255,255,0.7);
  margin-top: 16px;
  font-size: 14px;
  letter-spacing: 0.5px;
}

@media (max-width: 480px) {
  .container { padding: 16px; }
  .grid { width: 340px; height: 340px; gap: 8px; padding: 8px; }
  .cell { font-size: 26px; border-radius: 8px; }
  .cell[data-value="128"],
  .cell[data-value="256"],
  .cell[data-value="512"] { font-size: 22px; }
  .cell[data-value="1024"],
  .cell[data-value="2048"],
  .cell[data-value="4096"],
  .cell[data-value="8192"] { font-size: 18px; }
  .title { font-size: 30px; }
  .score-value { font-size: 22px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">2048</div>
    <div class="score-box">
      <div class="score-label">🏆 最高分</div>
      <div class="score-value" id="bestScore">0</div>
    </div>
    <div class="score-box">
      <div class="score-label">⭐ 当前分</div>
      <div class="score-value" id="score">0</div>
    </div>
  </div>

  <div class="controls">
    <button class="btn btn-new" onclick="newGame()">🔄 新游戏</button>
    <button class="btn btn-undo" onclick="undo()">↩ 撤销</button>
    <button class="btn btn-best" onclick="resetBest()">🗑 重置最高分</button>
  </div>

  <div class="grid" id="grid"></div>

  <p class="tip">⬆⬇⬅➡ 方向键控制 · 手机可滑动</p>
</div>

<div class="overlay" id="overlay" style="display:none;">
  <div class="dialog">
    <h2 id="dialogTitle"></h2>
    <p id="dialogMsg"></p>
    <button class="btn btn-new" onclick="closeDialog(); newGame();">🔄 再来一局</button>
    <button class="btn btn-undo" onclick="closeDialog()" style="background:#888;margin-left:8px;">✕ 关闭</button>
  </div>
</div>

<script>
// ============ 游戏核心 ============
const SIZE = 4;
let grid = [];
let score = 0;
let bestScore = 0;
let history = [];
let gameOver = false;
let won = false;

// 初始化/新游戏
function newGame() {
  grid = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
  score = 0;
  gameOver = false;
  won = false;
  history = [];
  addRandomTile();
  addRandomTile();
  updateUI();
  closeDialog();
}

// 添加随机方块 (90%出现2, 10%出现4)
function addRandomTile() {
  const empty = [];
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++)
      if (grid[r][c] === 0) empty.push([r, c]);
  if (empty.length === 0) return;
  const [r, c] = empty[Math.floor(Math.random() * empty.length)];
  grid[r][c] = Math.random() < 0.9 ? 2 : 4;
}

// 移动一行 (向左合并)
function mergeLine(line) {
  let arr = line.filter(v => v !== 0);
  let merged = false;
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      arr[i] *= 2;
      score += arr[i];
      arr.splice(i + 1, 1);
      merged = true;
    }
  }
  while (arr.length < SIZE) arr.push(0);
  return { line: arr, merged };
}

// 旋转/翻转网格 方便各方向复用逻辑
function rotate(g, times) {
  let res = g.map(r => [...r]);
  for (let t = 0; t < times; t++) {
    const n = Array.from({length: SIZE}, () => Array(SIZE).fill(0));
    for (let r = 0; r < SIZE; r++)
      for (let c = 0; c < SIZE; c++)
        n[c][SIZE - 1 - r] = res[r][c];
    res = n;
  }
  return res;
}

function canMove() {
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      if (grid[r][c] === 0) return true;
      if (r < SIZE - 1 && grid[r][c] === grid[r + 1][c]) return true;
      if (c < SIZE - 1 && grid[r][c] === grid[r][c + 1]) return true;
    }
  return false;
}

function move(direction) {
  if (gameOver) return;
  // 0:上 1:右 2:下 3:左
  const rotations = [0, 3, 2, 1]; // 上需要旋转3次，右0次，下1次，左2次
  const rot = rotations[direction];

  const before = grid.map(r => [...r]);
  const oldScore = score;

  let g = rotate(grid, rot);
  let anyMoved = false;
  for (let r = 0; r < SIZE; r++) {
    const { line, merged } = mergeLine(g[r]);
    if (line.join(',') !== g[r].join(',')) anyMoved = true;
    g[r] = line;
  }
  grid = rotate(g, (4 - rot) % 4);

  if (anyMoved) {
    history.push({ grid: before, score: oldScore });
    addRandomTile();
    if (score > bestScore) {
      bestScore = score;
      localStorage.setItem('_2048_best', bestScore);
    }
    updateUI();

    // 检查是否达到2048
    if (!won) {
      for (let r = 0; r < SIZE; r++)
        for (let c = 0; c < SIZE; c++)
          if (grid[r][c] >= 2048) { won = true; showDialog('🎉 恭喜！', '你合成到了 2048！<br>可以继续挑战更高分！'); return; }
    }

    if (!canMove()) {
      gameOver = true;
      updateUI();
      showDialog('😢 游戏结束', `最终得分: <b>${score}</b><br>再试一局吧！`);
    }
  }
}

// 撤销
function undo() {
  if (history.length === 0 || gameOver) return;
  const prev = history.pop();
  grid = prev.grid;
  score = prev.score;
  updateUI();
}

// 重置最高分
function resetBest() {
  bestScore = 0;
  localStorage.removeItem('_2048_best');
  document.getElementById('bestScore').textContent = '0';
}

function showDialog(title, msg) {
  document.getElementById('dialogTitle').innerHTML = title;
  document.getElementById('dialogMsg').innerHTML = msg;
  document.getElementById('overlay').style.display = 'flex';
}

function closeDialog() {
  document.getElementById('overlay').style.display = 'none';
}

// 更新界面
function updateUI() {
  const container = document.getElementById('grid');
  container.innerHTML = '';
  for (let r = 0; r < SIZE; r++)
    for (let c = 0; c < SIZE; c++) {
      const cell = document.createElement('div');
      cell.className = 'cell';
      const v = grid[r][c];
      if (v > 0) {
        cell.textContent = v;
        cell.setAttribute('data-value', v);
      }
      container.appendChild(cell);
    }
  document.getElementById('score').textContent = score;
}

// 保存最高分
function loadBest() {
  const saved = localStorage.getItem('_2048_best');
  if (saved) bestScore = parseInt(saved) || 0;
  document.getElementById('bestScore').textContent = bestScore;
}

// ============ 事件处理 ============
document.addEventListener('keydown', e => {
  switch (e.key) {
    case 'ArrowUp': e.preventDefault(); move(0); break;
    case 'ArrowRight': e.preventDefault(); move(1); break;
    case 'ArrowDown': e.preventDefault(); move(2); break;
    case 'ArrowLeft': e.preventDefault(); move(3); break;
  }
});

// 触屏滑动支持
let touchStartX = 0, touchStartY = 0;
document.addEventListener('touchstart', e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, {passive: true});

document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - touchStartX;
  const dy = e.changedTouches[0].clientY - touchStartY;
  const absDx = Math.abs(dx), absDy = Math.abs(dy);
  if (Math.max(absDx, absDy) < 30) return;
  if (absDx > absDy) move(dx > 0 ? 1 : 3);
  else move(dy > 0 ? 2 : 0);
});

// ============ 启动 ============
loadBest();
newGame();
</script>
</body>
</html>
